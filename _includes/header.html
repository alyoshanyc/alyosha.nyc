<a class="skip-link" href="#main">Skip to content</a>

<header class="site-header" id="site-header">
	<div class="site-header__inner">
		<a class="site-brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>

		<button class="nav-toggle" aria-expanded="false" aria-controls="primary-nav" aria-label="Open menu">
			<span></span><span></span>
		</button>

		<nav class="site-nav" id="primary-nav" aria-label="Primary">
			<ul class="menu">
				<li><a href="{{ '/about/' | relative_url }}">About</a></li>
				{% for p in site.projects %}{% unless p.parent %}
				<li><a href="{{ '/projects/' | append: p.id | append: '/' | relative_url }}">{{ p.title }}</a></li>
				{% endunless %}{% endfor %}
				<li><a href="{{ '/contact/' | relative_url }}">Contact</a></li>
			</ul>
		</nav>
	</div>
</header>
